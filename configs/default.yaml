# DepthFormer 配置

# 训练
training:
  batch_size: 16
  epochs: 40
  lr: 0.00001       # neck+decoder: 1e-5, encoder: 1e-6
  weight_decay: 0.01
  warmup_epochs: 0
  grad_clip: 1.0
  image_size: 504     # 504 = 36 × 14, 整除 DINOv2 patch
  lr_decay_power: 0.9 # 多项式 LR 衰减

# 损失函数 (对齐 DA-V2)
loss:
  type: silog

# 优化器
optimizer:
  name: "adamw"
  betas: [0.9, 0.999]

# 数据集
data:
  name: "nyu_depth_v2"
  train_split: "train"
  val_split: "val"
  num_workers: 4

# 模型
model:
  neck_dim: 256
  num_heads: 8
  feature_layers: [2, 5, 8, 11]
