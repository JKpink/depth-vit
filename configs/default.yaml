# DepthFormer 配置

# Plan A: 自研ViT
plan_a:
  encoder: "vit_custom"
  image_size: [384, 384]
  patch_size: 16
  num_layers: 12
  embed_dim: 384
  num_heads: 6
  mlp_ratio: 4
  pretrained: false

# Plan B: 冻结DINOv2
plan_b:
  encoder: "dinov2_small"
  freeze_encoder: true
  image_size: [384, 384]

# 解码器（A+B共用）
decoder:
  num_scales: 3          # L4, L8, L12 三层特征
  feature_dims: [384, 384, 384]
  decoder_dims: [192, 96, 48]
  output_size: [384, 384]

# 损失函数
loss:
  lambda_l1: 0.6
  lambda_ssim: 0.3
  lambda_grad: 0.1
  grad_threshold: 0.05   # 梯度图阈值（用于边界mask）

# 训练
training:
  batch_size: 32
  epochs: 100
  lr: 0.0001
  weight_decay: 0.0001
  warmup_epochs: 5
  grad_clip: 1.0

# 优化器
optimizer:
  name: "adamw"
  betas: [0.9, 0.999]

# 数据集
data:
  name: "nyu_depth_v2"
  train_split: "train"
  val_split: "val"
  num_workers: 4
